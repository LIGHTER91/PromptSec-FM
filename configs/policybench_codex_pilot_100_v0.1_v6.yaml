  HARD_NEGATIVE_SPECIAL_CASES: 0.06

counterfactual_quotas:
  POLICY_CHANGE: 0.04
  USER_GOAL_CHANGE: 0.04
  SOURCE_ROLE_CHANGE: 0.04
  AUTHORITY_DELEGATION_CHANGE: 0.04
  CAPABILITY_CHANGE: 0.04
  PRESENTATION_CHANGE: 0.04

generation:
  provider: codex_cli
  model: "${PROMPTSEC_CODEX_MODEL}"
  model_revision: null
  temperature: 0.0
  max_retries: 4
  concurrency: 1
  timeout_seconds: 900
  max_response_bytes: 1048576
